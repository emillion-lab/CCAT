<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f2027">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg">
<title>CCAT — Категория С v2 🚛</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#0f2027 0%,#203a43 50%,#2c5364 100%);color:#e8f4f8;min-height:100vh;padding:10px}
.container{max-width:1100px;margin:0 auto}
.header{text-align:center;padding:18px;background:rgba(16,185,129,0.1);border-radius:15px;margin-bottom:15px}
.header h1{font-size:1.7em;background:linear-gradient(135deg,#10b981,#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{color:#94a3b8;font-size:.9em;margin-top:5px}
.mode-switcher{display:flex;gap:8px;justify-content:center;margin:15px 0;flex-wrap:wrap}
.mode-btn{padding:12px 18px;border:2px solid rgba(16,185,129,0.3);background:rgba(255,255,255,0.05);color:#e8f4f8;border-radius:10px;font-size:1em;cursor:pointer;transition:all .3s;font-weight:bold}
.mode-btn:hover{background:rgba(16,185,129,0.1);border-color:#10b981}
.mode-btn.active{background:linear-gradient(135deg,#10b981,#059669);border-color:#10b981;color:#fff}
.content-section{display:none}
.content-section.active{display:block;animation:fadeIn .4s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.section{background:rgba(16,185,129,0.05);padding:22px;border-radius:15px;margin-bottom:18px;border:1px solid rgba(16,185,129,0.15)}
.section h2{color:#10b981;margin-bottom:16px;font-size:1.3em;border-bottom:2px solid #10b981;padding-bottom:8px}
.signs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;margin-top:15px}
.speed-card{background:linear-gradient(135deg,rgba(16,185,129,0.1),rgba(5,150,105,0.1));padding:16px;border-radius:12px;border:2px solid #10b981;text-align:center}
.speed-number{font-size:2em;font-weight:bold;color:#10b981;margin:8px 0}
.sign-title{font-weight:bold;color:#e8f4f8;font-size:.95em}
.mnemonic-box{background:linear-gradient(135deg,rgba(255,193,7,0.15),rgba(251,191,36,0.15));padding:12px 15px;border-radius:10px;margin-top:12px;border-left:4px solid #fbbf24;font-style:italic}
.table{width:100%;border-collapse:collapse;margin-top:12px;font-size:.95em}
.table th,.table td{padding:10px;text-align:left;border-bottom:1px solid rgba(16,185,129,0.1)}
.table th{background:rgba(16,185,129,0.15);color:#10b981;font-weight:bold}
.table td{background:rgba(255,255,255,0.02)}
.filter-btn{padding:10px 16px;border:none;border-radius:10px;background:rgba(255,255,255,0.1);color:#e8f4f8;cursor:pointer;transition:all .3s;font-size:.95em;margin:0 6px 8px 0}
.filter-btn.active{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
.question-card{background:rgba(16,185,129,0.05);padding:24px;border-radius:15px;margin-bottom:15px;border:2px solid rgba(16,185,129,0.2)}
.question-number{color:#10b981;font-weight:bold;margin-bottom:12px}
.question-image{display:flex;justify-content:center;margin:15px 0;padding:15px;background:rgba(255,255,255,0.05);border-radius:10px}
.question-text{font-size:1.2em;margin-bottom:20px;line-height:1.5}
.answers{display:flex;flex-direction:column;gap:10px}
.answer-btn{background:rgba(255,255,255,0.05);border:2px solid rgba(16,185,129,0.3);padding:13px 16px;border-radius:10px;color:#e8f4f8;font-size:1em;cursor:pointer;transition:all .25s;text-align:left}
.answer-btn:hover:not(.disabled){background:rgba(16,185,129,0.1);border-color:#10b981}
.answer-btn.correct{background:rgba(16,185,129,0.2);border-color:#10b981}
.answer-btn.wrong{background:rgba(239,68,68,0.2);border-color:#ef4444}
.answer-btn.disabled{cursor:not-allowed;opacity:.75}
.explanation{background:linear-gradient(135deg,rgba(255,193,7,0.15),rgba(251,191,36,0.15));padding:14px;border-radius:10px;margin-top:16px;border-left:4px solid #fbbf24;display:none}
.explanation.show{display:block;animation:fadeIn .3s}
.nav-buttons{display:flex;gap:12px;margin-top:15px}
.nav-btn{flex:1;padding:14px;border:none;border-radius:10px;font-size:1.05em;cursor:pointer;font-weight:bold}
.btn-prev{background:rgba(148,163,184,0.2);color:#e8f4f8}
.btn-next{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
.score-display{text-align:center;padding:12px;background:rgba(16,185,129,0.1);border-radius:10px;margin-bottom:15px;font-size:1.1em}
.final-score{background:rgba(16,185,129,0.1);padding:30px;border-radius:15px;text-align:center;display:none}
.final-score.show{display:block}
.final-score h2{font-size:2em;color:#10b981;margin-bottom:15px}
.final-score .percentage{font-size:3.2em;font-weight:bold;color:#10b981;margin:15px 0}
.restart-btn{background:linear-gradient(135deg,#10b981,#059669);color:#fff;padding:13px 28px;border:none;border-radius:10px;font-size:1.05em;cursor:pointer;margin-top:12px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🚛 CCAT — Категория С v2</h1>
    <p>Наръчник · <span id="qcount">–</span> въпроса · Изпитен симулатор · Интервални повторения · Данни към 07/2026</p>
  </div>

  <div class="mode-switcher">
    <button class="mode-btn active" onclick="switchMode('handbook',this)">📚 Наръчник</button>
    <button class="mode-btn" onclick="switchMode('train',this)">🎯 Тренировка</button>
    <button class="mode-btn" onclick="switchMode('exam',this)">⏱️ Изпит</button>
    <button class="mode-btn" onclick="switchMode('mist',this)">🔁 Грешки</button>
    <button class="mode-btn" onclick="switchMode('stats',this)">📈 Статистика</button>
  </div>

  <div id="handbook-section" class="content-section active"><div id="handbook"></div></div>

  <div id="train-section" class="content-section">
    <div id="train-filters" style="margin-bottom:10px"></div>
    <div class="score-display" id="train-prog"></div>
    <div id="train-box"></div>
    <div class="nav-buttons"><button class="nav-btn btn-prev" onclick="trNav(-1)">⬅️ Предишен</button><button class="nav-btn btn-next" onclick="trNav(1)">Следващ ➡️</button></div>
  </div>

  <div id="exam-section" class="content-section"><div id="exam-box"></div></div>
  <div id="mist-section" class="content-section"><div id="mist-box"></div></div>
  <div id="stats-section" class="content-section"><div id="stats-box"></div></div>
</div>
<script src="data1.js"></script>
<script src="data2.js"></script>
<script src="handbook.js"></script>
<script src="app.js"></script>
</body>
</html>
